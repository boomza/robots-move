# This is an example workflow for a macOS ARM build with Node.js

name: Build for Mac ARM

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Install dependencies
      run: npm install --production
        
    - name: Build
      run: npm run build

    - name: Commit build artifacts to new branch
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git checkout -b builds/mac-arm
        git add dist/
        git add node_modules/
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Add build for Mac ARM"
          git push origin builds/mac-arm --force
        fi