# This is an example workflow for a macOS ARM build with Node.js

name: Build Mac ARM

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Setup Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '24'

    - name: Install dependencies
      run: |
        npm install --production
        git add node_modules/ # Adding node_modules to the repository

    - name: Build
      run: npm run build

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build
        path: ./build/
